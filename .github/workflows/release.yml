name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cross-compile and package
        run: |
          mkdir -p dist
          for os_arch in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${os_arch%/*}"
            arch="${os_arch#*/}"
            dir="ditty-${os}-${arch}"
            mkdir -p "build/${dir}"
            echo "Building ${dir}"
            GOOS="$os" GOARCH="$arch" go build -o "build/${dir}/ditty" .
            tar -czf "dist/${dir}.tar.gz" -C build "$dir"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
