name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cross-compile and package
        run: |
          mkdir -p dist
          for os_arch in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${os_arch%/*}"
            arch="${os_arch#*/}"
            dir="ditty-${os}-${arch}"
            mkdir -p "build/${dir}"
            echo "Building ${dir}"
            GOOS="$os" GOARCH="$arch" go build -o "build/${dir}/ditty" .
            tar -czf "dist/${dir}.tar.gz" -C build "$dir"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Compute SHA256 for each platform tarball.
          SHA_DARWIN_ARM64=$(sha256sum dist/ditty-darwin-arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(sha256sum dist/ditty-darwin-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum dist/ditty-linux-arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum dist/ditty-linux-amd64.tar.gz | awk '{print $1}')

          BASE_URL="https://github.com/viettrungluu/ditty/releases/download/${TAG}"

          # Generate the formula.
          cat > ditty.rb <<FORMULA
          class Ditty < Formula
            desc "Convert line-interactive programs (REPLs, debuggers) into CLI programs"
            homepage "https://github.com/viettrungluu/ditty"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/ditty-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end

              on_intel do
                url "${BASE_URL}/ditty-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/ditty-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end

              on_intel do
                url "${BASE_URL}/ditty-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "ditty"
            end

            test do
              assert_match "ditty", shell_output("#{bin}/ditty --help")
            end
          end
          FORMULA

          # Remove leading whitespace (heredoc was indented for readability).
          sed -i 's/^          //' ditty.rb

          # Push to the homebrew-tap repo.
          gh api repos/viettrungluu/homebrew-tap/contents/Formula/ditty.rb \
            --method PUT \
            --field message="Update ditty to ${TAG}" \
            --field content="$(base64 -w0 ditty.rb)" \
            --field sha="$(gh api repos/viettrungluu/homebrew-tap/contents/Formula/ditty.rb --jq '.sha')"
